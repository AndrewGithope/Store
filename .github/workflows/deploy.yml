name: Deploy Angular App to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Inject API Key into Environment
        run: |
          node -e "
            const fs = require('fs');
            const path = 'src/environments/environment.ts';
            let content = fs.readFileSync(path, 'utf8');
            content = content.replace(/geminiApiKey:\s*['\"].*?['\"]/, \`geminiApiKey: '\${process.env.GEMINI_API_KEY}'\`);
            fs.writeFileSync(path, content);
          "
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Build
        run: npx ng build --base-href=/Store/

      - name: Create 404.html for Routing
        run: cp dist/my-angular-store-app/browser/index.html dist/my-angular-store-app/browser/404.html

      - name: Deploy to GitHub Pages
        uses: PeaceIris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/my-angular-store-app/browser